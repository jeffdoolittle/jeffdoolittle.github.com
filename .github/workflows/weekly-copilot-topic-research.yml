name: Weekly Copilot Topic Research

on:
  schedule:
    # 14:00 UTC on Friday (6:00 AM PT during PST, 7:00 AM PT during PDT)
    - cron: "0 14 * * 5"
  workflow_dispatch:

concurrency:
  group: weekly-copilot-topic-research
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  create-weekly-research-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create and assign weekly research issue
        uses: actions/github-script@v7
        with:
          script: |
            const weeklyTitlePrefix = 'Weekly content research suggestions (';
            const today = new Date();
            const yyyy = today.getUTCFullYear();
            const mm = String(today.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(today.getUTCDate()).padStart(2, '0');
            const dateStamp = `${yyyy}-${mm}-${dd}`;

            const existingOpenIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existingWeeklyIssue = existingOpenIssues.find((issue) => !issue.pull_request && issue.title.startsWith(weeklyTitlePrefix));
            if (existingWeeklyIssue) {
              core.info(`Skipping creation because issue #${existingWeeklyIssue.number} is already open: ${existingWeeklyIssue.html_url}`);
              return;
            }

            const title = `${weeklyTitlePrefix}${dateStamp})`;

            const body = [
              '## Task for Copilot cloud agent',
              '',
              'Research recent internet sources and propose blog/article ideas that are a strong fit for Jeff Doolittle\'s website and writing style.',
              '',
              '### Audience + Theme Fit',
              '- AI and engineering',
              '- Software process, design, and technical leadership',
              '- Human psychology in software engineering',
              '- Adjacent topics that would interest experienced software engineers and engineering leaders',
              '',
              '### Research Requirements',
              '- Focus on what is newly published, newly announced, or newly relevant in the last 7 days (up to 14 days only if high-signal).',
              '- Prioritize credible original sources (vendor engineering blogs, research labs, standards bodies, conference talks, notable essays, and well-sourced industry analysis).',
              '- Prioritize current news-cycle relevance over evergreen advice.',
              '- Provide 6 to 10 suggestions total.',
              '- Include at least one suggestion in each core area: AI and engineering; software process/design/technical leadership; human psychology in software engineering.',
              '- Do not include duplicate or near-duplicate stories.',
              '',
              '### Output Format (required for each suggestion)',
              '1. **Title**',
              '2. **Original source URL**',
              '3. **Publication date**: ISO date when available',
              '4. **Why this is timely now**: 1 to 2 sentences tied to the current news cycle',
              '5. **Summary**: 2 to 4 sentences',
              '6. **Topic match**: map to one or more of the theme areas above',
              '7. **Why this fits jeffdoolittle.github.com**: specific explanation tied to likely audience value and Jeff\'s perspective',
              '8. **Potential angle/headline ideas**: 1 to 2 ideas',
              '',
              '### Final Organization (required)',
              '- Group your suggestions under these headings:',
              '  - AI and engineering',
              '  - Software process, design, and technical leadership',
              '  - Human psychology in software engineering',
              '- Put at least one suggestion under each heading.',
              '- You may add a fourth section for adjacent topics after the three required sections.',
              '',
              '### Validation',
              '- End with a short checklist confirming: (a) at least one suggestion per required area, (b) all URLs included, (c) each suggestion is tied to current news-cycle timing.',
              '',
              '### Quality Bar',
              '- Be concrete and specific.',
              '- Favor signal over hype.',
              '- Include enough context that Jeff can decide quickly what to write next.',
              '',
              'Post your full findings as a comment on this issue.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['enhancement'],
            });

            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['copilot'],
              });
              core.info('Assigned issue to @copilot.');
            } catch (error) {
              core.warning(`Could not assign @copilot automatically: ${error.message}`);
              core.setFailed('Issue created, but assignment to @copilot failed. Check Copilot cloud agent availability and repository settings.');
            }