name: Weekly Copilot Topic Research

on:
  schedule:
    # 16:00 UTC on Friday (8:00 AM PT during PST, 9:00 AM PT during PDT)
    - cron: "0 16 * * 5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-weekly-research-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create and assign weekly research issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date();
            const yyyy = today.getUTCFullYear();
            const mm = String(today.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(today.getUTCDate()).padStart(2, '0');
            const dateStamp = `${yyyy}-${mm}-${dd}`;

            const title = `Weekly content research suggestions (${dateStamp})`;

            const body = [
              '## Task for Copilot cloud agent',
              '',
              'Research recent internet sources and propose blog/article ideas that are a strong fit for Jeff Doolittle\'s website and writing style.',
              '',
              '### Audience + Theme Fit',
              '- AI and engineering',
              '- Software process, design, and technical leadership',
              '- Human psychology in software engineering',
              '- Adjacent topics that would interest experienced software engineers and engineering leaders',
              '',
              '### Research Requirements',
              '- Focus on what is newly published, emerging, or newly relevant in the last 7 to 14 days.',
              '- Prioritize credible original sources (vendor engineering blogs, research labs, standards bodies, conference talks, notable essays, and well-sourced industry analysis).',
              '- Provide 6 to 10 suggestions.',
              '- Do not include duplicate or near-duplicate stories.',
              '',
              '### Output Format (required for each suggestion)',
              '1. **Title**',
              '2. **Original source URL**',
              '3. **Summary**: 2 to 4 sentences',
              '4. **Topic match**: map to one or more of the theme areas above',
              '5. **Why this fits jeffdoolittle.github.com**: specific explanation tied to likely audience value and Jeff\'s perspective',
              '6. **Potential angle/headline ideas**: 1 to 2 ideas',
              '',
              '### Quality Bar',
              '- Be concrete and specific.',
              '- Favor signal over hype.',
              '- Include enough context that Jeff can decide quickly what to write next.',
              '',
              'Post your full findings as a comment on this issue.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['enhancement'],
            });

            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['copilot'],
              });
              core.info('Assigned issue to @copilot.');
            } catch (error) {
              core.warning(`Could not assign @copilot automatically: ${error.message}`);
              core.setFailed('Issue created, but assignment to @copilot failed. Check Copilot cloud agent availability and repository settings.');
            }