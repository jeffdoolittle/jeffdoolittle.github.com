<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <style>text { font-family: Inter, system-ui, sans-serif; }</style>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Vision star: top spike y=15, bottom spike y=106 -->
  <polygon
    points="300,15 312,48 348,50 320,72 329,106 300,86 271,106 280,72 252,50 288,48"
    fill="#f59e0b" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="63" text-anchor="middle" dominant-baseline="middle"
    font-size="13" font-weight="700" fill="#1a1a1a">Vision</text>

  <!-- Left Values strip -->
  <polygon points="55,778 90,778 210,133 185,133" fill="#f59e0b"/>
  <text transform="rotate(-79 135 456)" x="135" y="456"
    text-anchor="middle" dominant-baseline="middle"
    font-size="14" font-weight="600" letter-spacing="1" fill="#1a1a1a">Values</text>

  <!-- Right Values strip -->
  <polygon points="510,778 545,778 415,133 390,133" fill="#f59e0b"/>
  <text transform="rotate(79 465 456)" x="465" y="456"
    text-anchor="middle" dominant-baseline="middle"
    font-size="14" font-weight="600" letter-spacing="1" fill="#1a1a1a">Values</text>

  <!-- Road: dark grey -->
  <polygon points="90,778 510,778 390,133 210,133" fill="#4a4a4a"/>

  <!-- Center dashed line -->
  <line x1="300" y1="133" x2="300" y2="778"
    stroke="#a0a0a0" stroke-width="1.5" stroke-dasharray="14,9"/>

  <!-- Mission triangle -->
  <polygon points="300,153 350,253 250,253" fill="#5584b8" filter="url(#shadow)"/>
  <text x="300" y="220" text-anchor="middle" dominant-baseline="middle"
    font-size="14" font-weight="600" fill="#ffffff">Mission</text>

  <!-- Strategies circle: r=55 -->
  <circle cx="300" cy="443" r="55" fill="#4a9e8a" filter="url(#shadow)"/>
  <text x="300" y="443" text-anchor="middle" dominant-baseline="middle"
    font-size="14" font-weight="600" fill="#ffffff">Strategies</text>

  <!-- Tactics rectangle: smaller, sharp corners -->
  <rect x="220" y="590" width="160" height="68" fill="#b87040" filter="url(#shadow)"/>
  <text x="300" y="624" text-anchor="middle" dominant-baseline="middle"
    font-size="14" font-weight="600" fill="#ffffff">Tactics</text>
</svg>
