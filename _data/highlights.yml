- title: The Fallacies of Distributed Computing
  date: 2021-07-22
  summary: >-
    <a href="/2021/07/22/the-fallacies-of-distributed-computing-with-peter-deutsch/">The Fallacies of Distributed Computing</a> have become something of an internet icon, at least within the software development community. L Peter Deutsch recently joined me on <a href="2021/07/22/the-fallacies-of-distributed-computing-with-peter-deutsch/">Software Engineering Radio</a> to discuss the history of the fallacies and their ongoing relevance. We had a great conversation and I hope you enjoy the show!
